services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clauses
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed so a locally-run backend (dev mode) can connect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clauses"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/clauses
      CORS_ORIGINS: '["http://localhost","http://localhost:4200"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000" # exposes the API + Swagger docs at /docs

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
